name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: ${{ matrix.os }} / py${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    # Guard against a hung test/plugin wasting the full 6 h runner budget: the
    # whole suite runs in well under a minute, so 15 minutes is a generous cap
    # that turns any future hang into a fast, visible failure.
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: pip install -e ".[dev]"
      - name: Lint
        run: ruff check src tests
      - name: Format check
        run: ruff format --check src tests
      - name: Type check
        run: mypy src
      - name: Tests
        run: pytest --cov=stavau --cov-report=term-missing

  audit:
    name: Dependency audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: pip install -e . pip-audit
      - name: pip-audit
        run: pip-audit
